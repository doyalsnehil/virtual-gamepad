<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Server Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 2rem;
            display: flex; gap: 2rem;
        }
        .panel {
            background: rgba(255, 255, 255, 0.05);
            padding: 2rem; border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .qr-panel {
            display: flex; flex-direction: column; align-items: center;
        }
        #qrcode {
            margin-top: 1rem;
            background: white;
            padding: 10px;
            border-radius: 10px;
        }
        .device-list {
            flex-grow: 1;
        }
        .device-item {
            background: rgba(255,255,255,0.1);
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            padding: 8px 16px; border: none; border-radius: 5px;
            cursor: pointer; font-weight: bold;
        }
        .btn-approve { background: #4CAF50; color: white; }
        .btn-reject { background: #f44336; color: white; }
        .badge {
            background: #2196F3;
            padding: 4px 8px; border-radius: 10px;
            font-size: 12px; margin-left: 10px;
        }
        .badge.connected { background: #4CAF50; }
    </style>
</head>
<body>
    <div class="panel qr-panel">
        <h2>Connect Controller</h2>
        <p>Select Network Interface:</p>
        <select id="ip-select" style="margin-bottom: 1rem; padding: 5px; width: 100%; max-width: 200px; background: #222; color: white; border: 1px solid #444; border-radius: 5px;"></select>
        <div id="qrcode"></div>
        <p id="url-display" style="margin-top: 10px; font-family: monospace;"></p>
    </div>

    <div class="panel device-list">
        <h2>Connected Devices (<span id="device-count">0</span>)</h2>
        <div id="devices-container">
            <!-- Devices will appear here -->
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
